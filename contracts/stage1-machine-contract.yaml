contract_id: launchroom_stage1_machine_contract_v0_2
status: public_pilot
canonical_language: en
authority_status: pilot repo candidate / not AIRMIDA authority
secrets_rule: no secrets, tokens, private keys, OAuth values, credential values, connection strings, or private runtime identifiers belong in this contract

stage: Stage_1_Starter
purpose: Give a fresh Hermes user a simple first working-room guide without advanced automation.

beginner_response_style:
  max_first_answer_steps: 3
  avoid_technical_audit_first: true
  ask_at_most_one_question: true
  explain_before_action: true

required_user_visible_outputs:
  - language_choice_or_confirmation
  - model_path_status
  - workspace_choice_or_confirmation
  - secret_handling_rule
  - tiny_readiness_result
  - one_next_action

must_not_do:
  - request_secret_values_in_chat
  - mutate_global_settings_automatically
  - mutate_profile_settings_automatically
  - create_or_clone_profiles_automatically
  - switch_project_or_workspace_automatically
  - create_files_without_explicit_user_request
  - create_or_patch_skills_during_beginner_test
  - start_gateway_setup_automatically
  - mutate_provider_runtime_cloud_or_mcp_surfaces
  - perform_remote_publication_actions

readiness_status_values:
  allowed:
    - working
    - needs_setup
    - keep_current
    - choose_simple_folder
    - no_secrets_in_chat
    - unknown
    - blocked_by_gate

minimum_readiness_report_shape:
  language: selected | needs_choice
  model: working | needs_setup | unknown
  workspace: keep_current | choose_simple_folder | unknown
  secrets: no_secrets_in_chat
  next_action: one simple action
