name: validate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build drift check
        run: python scripts/build_agentpack.py --check
      - name: Doctor
        run: python scripts/doctor.py
      - name: Behavior contract
        run: python scripts/validate_behavior_contract.py
