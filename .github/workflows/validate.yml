name: validate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build drift check
        run: python scripts/build_agentpack.py --check
      - name: Doctor
        run: python scripts/doctor.py
      - name: Behavior contract
        run: python scripts/validate_behavior_contract.py
      - name: Language policy
        run: python scripts/validate_language_policy.py
      - name: Archive policy
        run: python scripts/validate_archive_policy.py
      - name: Profile recipe
        run: python scripts/validate_profile_recipe.py
      - name: Inventory contract
        run: python scripts/validate_inventory_contract.py
      - name: Profile setup tool
        run: python scripts/validate_profile_setup_tool.py
      - name: Pilot seed
        run: python scripts/validate_pilot_seed.py
      - name: Compile scripts
        run: python -m py_compile scripts/*.py
