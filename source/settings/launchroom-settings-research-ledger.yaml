artifact_id: LAUNCHROOM_SETTINGS_RESEARCH_LEDGER_v0_1
artifact_type: hermes_settings_research_ledger
status: draft_for_owner_review
language: en
created_for: launchroom-starter-pilot
created_scope: stage_1_research_basis_only
purpose:
  summary: Map Hermes settings to LaunchRoom setup decisions before generating any profile config, SOUL.md, profile instructions,
    or distribution package. This ledger is not an applied config. It records source-backed reasons, causal effects, risks,
    verification methods, and interactive button choices for the first practical LaunchRoom SaaS profile baseline.
  not_purpose:
  - not a secret store
  - not a raw export of the airmida profile
  - not a final config.yaml
  - not a substitute for official Hermes docs
  - not an immutable canon
source_policy:
  precedence:
  - official_hermes_docs
  - installed_hermes_default_config
  - sanitized_airmida_working_profile_patterns
  - public_practice_sources
  - owner_choices
  rules:
  - Official Hermes docs override stale local repo assumptions.
  - Installed DEFAULT_CONFIG records what Hermes actually defaults to on this machine/build.
  - Public practice can inform ergonomics, but must not override official security rules.
  - AIRMIDA profile patterns may be reused only after sanitization; never copy secrets, auth stores, sessions, memories, or
    raw MCP env values.
  - If a setting is not understood, mark it unknown_or_deferred instead of inventing a value.
source_ledger:
  official:
    configuration:
      url: https://hermes-agent.nousresearch.com/docs/user-guide/configuration
      extracted_claims:
      - config.yaml stores non-secret settings
      - .env stores API keys and secrets
      - auth.json stores OAuth credentials
      - config precedence is CLI arguments, config.yaml, .env, built-in defaults
      - terminal supports local, docker, ssh, modal, daytona, and singularity backends
      - terminal.cwd controls gateway/cron working directory; CLI uses launch directory
    security:
      url: https://hermes-agent.nousresearch.com/docs/user-guide/security
      extracted_claims:
      - approvals.mode supports manual, smart, and off
      - approvals.timeout defaults to 60 seconds and fails closed on timeout
      - approvals.mode off is equivalent to YOLO and should be used only in trusted environments
      - Hermes has defense-in-depth layers including command approvals, isolation, MCP credential filtering, context scanning,
        and input sanitization
    profiles:
      url: https://hermes-agent.nousresearch.com/docs/user-guide/profiles
      extracted_claims:
      - a profile is a separate Hermes home with its own config.yaml, .env, SOUL.md, memories, sessions, skills, cron jobs,
        state database, and gateway state
      - profiles are not workspaces or sandboxes
      - terminal.cwd is configured separately from profile identity
    profile_distributions:
      url: https://hermes-agent.nousresearch.com/docs/user-guide/profile-distributions
      extracted_claims:
      - profile distributions package SOUL.md, skills, cron jobs, MCP connections, config, manifest metadata, and env requirements
        as a git repository
      - recipients keep their own memories, sessions, API keys, logs, and state
      - authors must use gitignore/secret discipline because git itself will commit whatever is added
    example_config:
      url: https://github.com/NousResearch/hermes-agent/blob/main/cli-config.yaml.example
      extracted_claims:
      - provider can be auto or explicit provider identifiers
      - context_length and max_tokens should usually be left unset unless there is a concrete reason
      - terminal backend defaults to local and can be changed for sandboxing or remote execution
  installed_default_config:
    collection_method: selected non-secret keys from hermes_cli.config.DEFAULT_CONFIG
    collected_in_session: true
    selected_defaults:
      toolsets:
      - hermes-cli
      display.personality: ''
      display.language: en
      display.show_reasoning: false
      agent.image_input_mode: auto
      terminal.backend: local
      terminal.cwd: .
      terminal.timeout: 180
      terminal.persistent_shell: true
      approvals.mode: manual
      approvals.timeout: 60
      approvals.cron_mode: deny
      approvals.mcp_reload_confirm: true
      approvals.destructive_slash_confirm: true
      security.allow_private_urls: false
      security.redact_secrets: true
      security.tirith_enabled: true
      browser.allow_private_urls: false
      browser.auto_local_for_private_urls: true
      checkpoints.enabled: false
      checkpoints.max_snapshots: 20
      memory.memory_enabled: true
      memory.user_profile_enabled: true
      memory.write_approval: false
      agent.max_turns: 90
      agent.api_max_retries: 3
      agent.tool_use_enforcement: auto
      code_execution.mode: project
      file_read_max_chars: 100000
      tool_output.max_bytes: 50000
      tool_output.max_lines: 2000
      tool_output.max_line_length: 2000
  sanitized_airmida_patterns:
    status: partial_from_owner_screenshots_and_active_profile_context
    copied_values: false
    usable_patterns:
    - rich SOUL.md profile identity is materially better than a blank/default profile
    - strong project profile uses technical communication, project-scoped work, smart approvals, secret redaction, checkpoints,
      local execution, memory, and curated skills
    - configured tool/key/MCP presence is useful as capability evidence, but values must never be copied into the starter
      repo
  public_practice:
    daily_dose_masterclass:
      url: https://blog.dailydoseofds.com/p/hermes-agent-masterclass
      confidence: medium
      extracted_claims:
      - SOUL.md is the fixed identity frame inserted before memory and skills
      - profiles are useful for isolated agents with separate personality, memory, skills, sessions, and channels
      - persistent memory and skills are core to Hermes productivity over time
    reddit_profile_example:
      url: https://www.reddit.com/r/hermesagent/comments/1t66lhy/my_simplest_yet_effective_hermes_agent_profile/
      confidence: unavailable
      note: Firecrawl extraction failed; do not use as evidence until manually reviewed or fetched through another method.
stage_model:
  bootstrap_0_global_health:
    owns:
    - Hermes installation/version
    - Desktop/backend health
    - active profile selection
    - global gateway connection mode
    - config path/env path presence without secret values
    not_owned:
    - final SaaS profile identity
    - project workspace structure
    - provider/runtime/cloud mutations
  stage_1_profile_foundation:
    owns:
    - model/provider readiness decision
    - profile identity and SOUL.md requirements
    - profile config baseline for safety, memory, display, terminal backend, and bounded agent behavior
    - profile distribution metadata and env requirements
    - profile foundation report
    not_owned:
    - final workspace content beyond chosen path placeholder
    - software inventory
    - full tools/key setup
    - gateway/MCP wiring
    - SaaS operator kit
  stage_2_workspace:
    owns:
    - terminal.cwd final project workspace
    - workspace AGENTS.md/HERMES.md/project context files
    - project-local .hermes reports and workspace structure
settings:
- key: model.provider
  scope: profile
  stage_owner: stage_1_profile_foundation
  official_default: unset_or_auto_by_setup_flow
  launchroom_default: user_selected_or_existing_configured_provider
  allowed_values_examples:
  - auto
  - nous
  - openai-codex
  - openrouter
  - anthropic
  - gemini
  - custom
  required_user_choice: if_missing
  causal_effect: Determines which backend account/model route Hermes uses for all reasoning and tool-calling work in this
    profile.
  why_default_is_not_enough: A blank provider leaves a beginner with a profile that may exist but cannot reliably perform
    work.
  saas_reason: SaaS setup requires a dependable model route before claiming the profile is operational.
  risk_if_wrong:
  - wrong provider can create auth failures or unexpected cost/rate behavior
  - copying source-profile credentials is forbidden
  write_method:
    preferred: hermes model or hermes setup --portal / provider setup flow
    config_if_known: model.provider
  verify_method:
  - hermes -p <profile> config show or profile show, sanitized
  - one-shot model smoke test with no secret output
  source_refs:
  - official.configuration
  - official.profiles
  - official.example_config
  launchroom_policy: required_or_explicitly_deferred
  confidence: medium
  interaction:
    mode: clarify_buttons
    setting_label: model.provider
    show_to: beginner_and_experienced
    explanation_from_fields:
    - causal_effect
    - why_default_is_not_enough
    - why_default_is_enough
    - saas_reason
    - risk_if_wrong
    beginner_default_button: recommended_existing_or_portal
    experienced_controls:
    - view_sources
    - custom_value
    - defer_with_reason
    buttons:
    - id: recommended_existing_or_portal
      label: Use existing provider or Hermes Portal/OAuth setup
      value: <existing_or_portal_provider>
      explanation: Recommended for beginners; avoids copying secrets and uses official Hermes setup/auth flow.
    - id: openrouter_or_anthropic
      label: Use API-key provider
      value: <provider_from_supported_list>
      explanation: For users who already have a provider key and understand billing/rate limits.
    - id: custom_local
      label: Custom/local provider
      value: <custom_provider>
      explanation: Advanced option; requires docs/source verification before writing config.
    - id: defer
      label: Defer model setup
      value: deferred
      explanation: Only acceptable if Stage 1 report marks profile not fully operational.
    selection_report_required: true
- key: model.default
  scope: profile
  stage_owner: stage_1_profile_foundation
  official_default: unset
  launchroom_default: user_selected_or_existing_working_model
  required_user_choice: if_missing
  causal_effect: Controls the default model used by the LaunchRoom profile when no CLI override is supplied.
  why_default_is_not_enough: Without a selected model, the user may have a profile shell but no reliable agent.
  saas_reason: A SaaS operator profile should use a capable coding/reasoning model and record how it was selected.
  risk_if_wrong:
  - weak model may create poor setup artifacts
  - expensive model may surprise beginner users
  write_method:
    preferred: hermes model or hermes setup --portal
    config_if_known: model.default or model depending on current Hermes schema
  verify_method:
  - one-shot model smoke test
  - profile foundation report records configured_or_deferred, not secret values
  source_refs:
  - official.configuration
  - official.example_config
  launchroom_policy: required_or_explicitly_deferred
  confidence: medium
  interaction:
    mode: clarify_buttons
    setting_label: model.default
    show_to: beginner_and_experienced
    explanation_from_fields:
    - causal_effect
    - why_default_is_not_enough
    - why_default_is_enough
    - saas_reason
    - risk_if_wrong
    beginner_default_button: recommended_existing
    experienced_controls:
    - view_sources
    - custom_value
    - defer_with_reason
    buttons:
    - id: recommended_existing
      label: Use current working model
      value: <existing_working_model>
      explanation: Best if Hermes already has a verified model.
    - id: choose_coding_model
      label: Choose strong coding/reasoning model
      value: <user_selected_model>
      explanation: Recommended for SaaS/project setup when no model is configured.
    - id: custom
      label: Custom model
      value: <custom_model>
      explanation: Advanced; verify with official/provider docs.
    - id: defer
      label: Defer model choice
      value: deferred
      explanation: Profile cannot pass as operational until smoke test succeeds.
    selection_report_required: true
- key: display.personality
  scope: profile
  stage_owner: stage_1_profile_foundation
  official_default: empty
  launchroom_default: technical
  allowed_values_examples:
  - technical
  - default
  - custom
  causal_effect: Sets the default assistant style for new sessions.
  why_default_is_not_enough: Empty/default personality does not bias the profile toward engineering-grade SaaS setup behavior.
  saas_reason: Technical style fits setup, validation, config explanation, and project-operator work.
  risk_if_wrong:
  - too casual can hide setup risks
  - too restrictive can reduce useful exploration
  write_method:
    config_key: display.personality
  verify_method:
  - sanitized config readback
  - new session observes technical concise behavior
  source_refs:
  - installed_default_config
  - sanitized_airmida_patterns
  launchroom_policy: apply_default_but_user_can_change_later
  confidence: medium
  interaction:
    mode: clarify_buttons
    setting_label: display.personality
    show_to: beginner_and_experienced
    explanation_from_fields:
    - causal_effect
    - why_default_is_not_enough
    - why_default_is_enough
    - saas_reason
    - risk_if_wrong
    beginner_default_button: recommended_technical
    experienced_controls:
    - view_sources
    - custom_value
    - defer_with_reason
    buttons:
    - id: recommended_technical
      label: Technical
      value: technical
      explanation: Best starter style for SaaS setup, verification, and engineering reports.
    - id: default
      label: Default Hermes style
      value: ''
      explanation: Less opinionated, but weaker for setup discipline.
    - id: custom
      label: Custom personality
      value: <custom_personality>
      explanation: Advanced; must remain compatible with LaunchRoom profile instructions.
    selection_report_required: true
- key: display.language
  scope: profile
  stage_owner: stage_1_profile_foundation
  official_default: en
  launchroom_default: detect_or_owner_choice
  causal_effect: Controls default language preference for profile responses/UI-adjacent behavior where supported.
  why_default_is_not_enough: English default may be wrong for beginner guidance if the user works in another language.
  saas_reason: Onboarding succeeds when explanations match the user's language while canonical repo artifacts can remain English.
  risk_if_wrong:
  - user confusion during setup
  - mixed-language reports if not documented
  write_method:
    config_key: display.language
  verify_method:
  - sanitized config readback
  - first LaunchRoom session mirrors selected language
  source_refs:
  - installed_default_config
  - owner_choices
  launchroom_policy: ask_once_then_apply
  confidence: medium
  interaction:
    mode: clarify_buttons
    setting_label: display.language
    show_to: beginner_and_experienced
    explanation_from_fields:
    - causal_effect
    - why_default_is_not_enough
    - why_default_is_enough
    - saas_reason
    - risk_if_wrong
    beginner_default_button: recommended_detect
    experienced_controls:
    - view_sources
    - custom_value
    - defer_with_reason
    buttons:
    - id: recommended_detect
      label: Use detected/user language
      value: <detected_or_selected_language>
      explanation: Best for beginner explanations.
    - id: english
      label: English
      value: en
      explanation: Useful for canonical docs and international teams.
    - id: custom
      label: Other language
      value: <language_code_or_name>
      explanation: User-selected language.
    selection_report_required: true
- key: display.show_reasoning
  scope: profile
  stage_owner: stage_1_profile_foundation
  official_default: false
  launchroom_default: false
  causal_effect: Shows or hides reasoning sections when backend provides them.
  why_default_is_enough: Beginner setup usually needs clear decisions and evidence, not raw reasoning sections.
  saas_reason: Reports should contain summarized rationale, sources, and verification rather than long model-internal reasoning.
  risk_if_wrong:
  - noisy onboarding output
  - possible confusion between hidden reasoning and evidence report
  write_method:
    config_key: display.show_reasoning
  verify_method:
  - sanitized config readback
  source_refs:
  - installed_default_config
  launchroom_policy: keep_default_false
  confidence: high
  interaction:
    mode: clarify_buttons
    setting_label: display.show_reasoning
    show_to: beginner_and_experienced
    explanation_from_fields:
    - causal_effect
    - why_default_is_not_enough
    - why_default_is_enough
    - saas_reason
    - risk_if_wrong
    beginner_default_button: recommended_false
    experienced_controls:
    - view_sources
    - custom_value
    - defer_with_reason
    buttons:
    - id: recommended_false
      label: Hide reasoning blocks
      value: false
      explanation: Use evidence summaries instead of noisy reasoning.
    - id: show
      label: Show reasoning if backend provides it
      value: true
      explanation: Advanced/debug option; can increase noise.
    selection_report_required: true
- key: agent.image_input_mode
  scope: profile
  stage_owner: stage_1_profile_foundation
  official_default: auto
  launchroom_default: auto
  causal_effect: Controls how image attachments are sent to the model.
  why_default_is_enough: Auto lets Hermes choose the supported route and is suitable for beginner screenshots during setup.
  saas_reason: Screenshots are useful for Desktop setup without forcing a provider-specific image mode.
  risk_if_wrong:
  - forcing unsupported mode may break screenshot-driven troubleshooting
  write_method:
    config_key: agent.image_input_mode
  verify_method:
  - sanitized config readback
  - optional screenshot smoke test when vision is available
  source_refs:
  - installed_default_config
  launchroom_policy: keep_default_auto
  confidence: medium
  interaction:
    mode: clarify_buttons
    setting_label: agent.image_input_mode
    show_to: beginner_and_experienced
    explanation_from_fields:
    - causal_effect
    - why_default_is_not_enough
    - why_default_is_enough
    - saas_reason
    - risk_if_wrong
    beginner_default_button: recommended_auto
    experienced_controls:
    - view_sources
    - custom_value
    - defer_with_reason
    buttons:
    - id: recommended_auto
      label: Auto
      value: auto
      explanation: Lets Hermes choose the best supported path for screenshots/images.
    - id: custom
      label: Custom image mode
      value: <custom_mode>
      explanation: Advanced; use only if official docs/provider require it.
    selection_report_required: true
- key: approvals.mode
  scope: profile
  stage_owner: stage_1_profile_foundation
  official_default: manual
  launchroom_default: smart
  allowed_values:
  - manual
  - smart
  - false
  causal_effect: Controls how Hermes handles dangerous-command approvals.
  why_default_is_not_enough: Manual is safest but can make beginner setup painfully slow and encourage users to bypass prompts
    blindly.
  why_launchroom_value: Smart preserves a safety layer while reducing friction for low-risk setup commands.
  saas_reason: SaaS setup needs productive local execution without disabling safety prompts.
  risk_if_wrong:
    manual: slow onboarding and too many interruptions
    false: unsafe for beginners; equivalent to YOLO-style bypass except hardline blocks
  write_method:
    config_key: approvals.mode
  verify_method:
  - sanitized config readback
  - approval behavior remains active for dangerous commands
  source_refs:
  - official.security
  - installed_default_config
  - sanitized_airmida_patterns
  launchroom_policy: mandatory_smart_unless_owner_overrides
  confidence: high
  interaction:
    mode: clarify_buttons
    setting_label: approvals.mode
    show_to: beginner_and_experienced
    explanation_from_fields:
    - causal_effect
    - why_default_is_not_enough
    - why_default_is_enough
    - saas_reason
    - risk_if_wrong
    beginner_default_button: recommended_smart
    experienced_controls:
    - view_sources
    - custom_value
    - defer_with_reason
    buttons:
    - id: recommended_smart
      label: Smart
      value: smart
      explanation: 'LaunchRoom default: productive but still safety-aware.'
    - id: manual
      label: Manual
      value: manual
      explanation: Maximum user control; slower setup.
    - id: 'off'
      label: Off / YOLO-style
      value: 'off'
      explanation: Advanced only in trusted sandbox; not recommended for beginners.
    selection_report_required: true
- key: approvals.timeout
  scope: profile
  stage_owner: stage_1_profile_foundation
  official_default: 60
  launchroom_default: 60
  causal_effect: Number of seconds approval prompts wait before fail-closed denial.
  why_default_is_enough: 60 seconds is the documented/default balanced timeout.
  saas_reason: Fail-closed approval timeout is safer than silently continuing when the user is absent.
  risk_if_wrong:
    too_low: beginner misses prompts
    too_high: runs hang too long
  write_method:
    config_key: approvals.timeout
  verify_method:
  - sanitized config readback
  source_refs:
  - official.security
  - installed_default_config
  launchroom_policy: keep_default_60
  confidence: high
  interaction:
    mode: clarify_buttons
    setting_label: approvals.timeout
    show_to: beginner_and_experienced
    explanation_from_fields:
    - causal_effect
    - why_default_is_not_enough
    - why_default_is_enough
    - saas_reason
    - risk_if_wrong
    beginner_default_button: recommended_60
    experienced_controls:
    - view_sources
    - custom_value
    - defer_with_reason
    buttons:
    - id: recommended_60
      label: 60 seconds
      value: 60
      explanation: Official/default balanced value.
    - id: longer
      label: Longer timeout
      value: <custom_seconds>
      explanation: Useful if user often steps away.
    - id: shorter
      label: Shorter timeout
      value: <custom_seconds>
      explanation: Advanced; may deny prompts too quickly.
    selection_report_required: true
- key: approvals.cron_mode
  scope: profile
  stage_owner: stage_1_profile_foundation
  official_default: deny
  launchroom_default: deny
  allowed_values:
  - deny
  - approve
  causal_effect: Controls how cron jobs handle dangerous commands.
  why_default_is_enough: Deny prevents unattended scheduled jobs from executing dangerous commands.
  saas_reason: No autonomous production-like actions before observability, rollback, and gates exist.
  risk_if_wrong:
    approve: dangerous autonomous cron behavior for beginners
  write_method:
    config_key: approvals.cron_mode
  verify_method:
  - sanitized config readback
  source_refs:
  - official.security
  - installed_default_config
  launchroom_policy: mandatory_deny_for_starter
  confidence: high
  interaction:
    mode: clarify_buttons
    setting_label: approvals.cron_mode
    show_to: beginner_and_experienced
    explanation_from_fields:
    - causal_effect
    - why_default_is_not_enough
    - why_default_is_enough
    - saas_reason
    - risk_if_wrong
    beginner_default_button: recommended_deny
    experienced_controls:
    - view_sources
    - custom_value
    - defer_with_reason
    buttons:
    - id: recommended_deny
      label: Deny dangerous cron commands
      value: deny
      explanation: Starter-safe default; no unattended dangerous commands.
    - id: approve
      label: Auto-approve in cron
      value: approve
      explanation: Advanced only after runtime/rollback/observability gates.
    selection_report_required: true
- key: approvals.mcp_reload_confirm
  scope: profile
  stage_owner: stage_1_profile_foundation
  official_default: true
  launchroom_default: true
  causal_effect: Requires confirmation before reloading MCP servers/tool cache.
  why_default_is_enough: Reloading MCP changes tool availability and can invalidate prompt cache; confirmation is appropriate
    for beginners.
  saas_reason: MCP becomes a later-stage integration surface and should not change silently during profile foundation.
  risk_if_wrong:
    false: accidental MCP reloads and confusing tool-surface changes
  write_method:
    config_key: approvals.mcp_reload_confirm
  verify_method:
  - sanitized config readback
  source_refs:
  - official.security
  - installed_default_config
  launchroom_policy: keep_true
  confidence: high
  interaction:
    mode: clarify_buttons
    setting_label: approvals.mcp_reload_confirm
    show_to: beginner_and_experienced
    explanation_from_fields:
    - causal_effect
    - why_default_is_not_enough
    - why_default_is_enough
    - saas_reason
    - risk_if_wrong
    beginner_default_button: recommended_true
    experienced_controls:
    - view_sources
    - custom_value
    - defer_with_reason
    buttons:
    - id: recommended_true
      label: Confirm MCP reloads
      value: true
      explanation: Prevents unexpected tool-surface changes.
    - id: 'false'
      label: Do not confirm reloads
      value: false
      explanation: Advanced only when MCP setup is stable.
    selection_report_required: true
- key: approvals.destructive_slash_confirm
  scope: profile
  stage_owner: stage_1_profile_foundation
  official_default: true
  launchroom_default: true
  causal_effect: Prompts before slash commands that discard state, such as clear/reset/undo.
  why_default_is_enough: Beginner onboarding should not lose context accidentally.
  saas_reason: Setup history and evidence matter; destructive session actions need confirmation.
  risk_if_wrong:
    false: accidental loss of session state
  write_method:
    config_key: approvals.destructive_slash_confirm
  verify_method:
  - sanitized config readback
  source_refs:
  - official.security
  - installed_default_config
  launchroom_policy: keep_true
  confidence: high
  interaction:
    mode: clarify_buttons
    setting_label: approvals.destructive_slash_confirm
    show_to: beginner_and_experienced
    explanation_from_fields:
    - causal_effect
    - why_default_is_not_enough
    - why_default_is_enough
    - saas_reason
    - risk_if_wrong
    beginner_default_button: recommended_true
    experienced_controls:
    - view_sources
    - custom_value
    - defer_with_reason
    buttons:
    - id: recommended_true
      label: Confirm destructive slash commands
      value: true
      explanation: Prevents accidental state loss.
    - id: 'false'
      label: Do not confirm
      value: false
      explanation: Advanced only; not recommended for onboarding.
    selection_report_required: true
- key: security.redact_secrets
  scope: profile
  stage_owner: stage_1_profile_foundation
  official_default: true
  launchroom_default: true
  causal_effect: Redacts detected secrets from model-visible content and logs/tool output where possible.
  why_default_is_enough: This is a mandatory safety baseline when configuring tools, keys, MCP, and gateways.
  saas_reason: SaaS setup inevitably touches provider/tool credentials; redaction must stay on.
  risk_if_wrong:
    false: unacceptable risk of secret exposure in chat, logs, reports, or artifacts
  write_method:
    config_key: security.redact_secrets
  verify_method:
  - sanitized config readback only; never print secrets to test it
  source_refs:
  - official.configuration
