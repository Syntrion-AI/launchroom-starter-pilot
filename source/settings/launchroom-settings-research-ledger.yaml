interactive_setup_model:
  status: draft_for_owner_review
  purpose: Make every LaunchRoom setting explainable and selectable through interactive choices, not hidden YAML editing.
  interaction_principles:
  - Show a short plain-language explanation before each setting or setting group.
  - Always provide a recommended LaunchRoom choice as the first button.
  - Always provide a safer/manual choice when applicable.
  - Always provide an advanced/custom option for experienced users.
  - Always provide a defer/skip option only when the setting can be safely postponed.
  - If a secret or credential is needed, never ask for the value in chat; route the user to Hermes UI, hermes auth, hermes
    setup, or .env file editing.
  - Record the selected option, reason, source, and verification result in the stage report.
  button_schema:
    question_template: What should LaunchRoom use for <setting_label>?
    explanation_required: true
    max_buttons_visible: 4
    required_buttons:
      recommended: Use LaunchRoom recommended value
      manual_or_safe: Use safer/manual/default value when meaningful
      custom: Custom / advanced
      defer: Defer only if safe for this stage
    report_fields:
    - setting_key
    - selected_button_id
    - selected_value
    - user_visible_explanation
    - source_refs
    - risk_acknowledged
    - verification_status
  audiences:
    beginner: Default path uses recommended buttons and short explanations.
    experienced: Advanced path exposes custom values, source links, and trade-offs.
  implementation_note: Future setup tool should translate each settings[].interaction.buttons item into clarify() choices
    or Desktop UI buttons. Do not enumerate choices inside prose only.
