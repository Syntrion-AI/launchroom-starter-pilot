- Should browser/private URL settings remain false until local SaaS preview stage, or should LaunchRoom enable them by default
  for localhost-first development?
- Should agent.max_turns remain Hermes default 90 for power users, or LaunchRoom starter default 60 for bounded onboarding?
- Which model/provider choices should be first-class in the beginner wizard: Nous Portal/OAuth, OpenAI Codex OAuth, OpenRouter
    API key, Anthropic API key, or custom/local?
