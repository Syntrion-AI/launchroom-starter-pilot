purpose:
  summary: Concrete LaunchRoom Starter baseline derived from the research ledger. This file says what the setup wizard should
    apply, ask, defer, or gate before generating profile config.yaml.
  not_purpose:
  - not an applied config.yaml
  - not a secret store
  - not a raw copy of any existing Hermes profile
  - not immutable; agent may propose changes with official/public evidence and verification
config_scope_model:
  global_foundation:
    description: Hermes Desktop/runtime health and default profile selection affect the whole app or multiple profiles.
    starter_action: inspect_and_explain_before_profile_install; do not mutate global surfaces without explicit user choice
    examples:
    - Hermes installed/version
    - Desktop health
    - active profile
    - gateway connection mode
    - config/env path presence without secret values
  profile_foundation:
    description: Settings inside one Hermes profile define the actual LaunchRoom agent.
    starter_action: apply this baseline to the selected LaunchRoom profile after user choices are collected
    examples:
    - config.yaml
    - SOUL.md
    - PROFILE_INSTRUCTIONS.md
    - skills
    - memory/session/cron boundaries
required_user_inputs:
  profile_name:
    default_suggestion: launchroom
    why_needed: Creates an isolated Hermes home instead of modifying default blindly.
  language:
    value: detect_or_owner_choice
    policy: ask_once_then_apply
    source_refs: &id009
    - installed_default_config
    - owner_choices
    reason: Onboarding succeeds when explanations match the user's language while canonical repo artifacts can remain English.
    risk_if_wrong: &id010
    - user confusion during setup
    - mixed-language reports if not documented
    interaction_button_default: recommended_detect
    write_method: &id011
      config_key: display.language
    verify_method: &id012
    - sanitized config readback
    - first LaunchRoom session mirrors selected language
  project_name:
    default_suggestion: <ask_user>
    why_needed: Used in explanations, reports, and workspace path suggestions.
  project_path:
    value: user_selected_project_path
    policy: collect_in_stage_1_if_user_provides_but_apply/verify_in_stage_2
    source_refs: &id013
    - official.configuration
    - official.profiles
    - installed_default_config
    reason: Project-local work must land in the user's chosen SaaS workspace, not a random shell directory.
    risk_if_wrong: &id014
      wrong_path: files/reports created in wrong project
      too_broad_path: agent sees more filesystem than needed
    interaction_button_default: recommended_project_path
    write_method: &id015
      config_key: terminal.cwd
    verify_method: &id016
    - sanitized config readback
    - terminal pwd/cwd smoke in profile session when applicable
  model_provider:
    value: user_selected_or_existing_configured_provider
    policy: required_or_explicitly_deferred
    source_refs: &id001
    - official.configuration
    - official.profiles
    - official.example_config
    reason: SaaS setup requires a dependable model route before claiming the profile is operational.
    risk_if_wrong: &id002
    - wrong provider can create auth failures or unexpected cost/rate behavior
    - copying source-profile credentials is forbidden
    interaction_button_default: recommended_existing_or_portal
    write_method: &id003
      preferred: hermes model or hermes setup --portal / provider setup flow
      config_if_known: model.provider
    verify_method: &id004
    - hermes -p <profile> config show or profile show, sanitized
    - one-shot model smoke test with no secret output
  model_default:
    value: user_selected_or_existing_working_model
    policy: required_or_explicitly_deferred
    source_refs: &id005
    - official.configuration
    - official.example_config
    reason: A SaaS operator profile should use a capable coding/reasoning model and record how it was selected.
    risk_if_wrong: &id006
    - weak model may create poor setup artifacts
    - expensive model may surprise beginner users
    interaction_button_default: recommended_existing
    write_method: &id007
      preferred: hermes model or hermes setup --portal
      config_if_known: model.default or model depending on current Hermes schema
    verify_method: &id008
    - one-shot model smoke test
    - profile foundation report records configured_or_deferred, not secret values
