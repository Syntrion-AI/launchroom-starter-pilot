wizard_flow:
  mode: interactive_buttons
  beginner_path:
  - Explain global vs profile settings.
  - Ask profile_name, language, project_name, project_path.
  - Detect existing model/provider readiness without exposing secrets.
  - Show grouped LaunchRoom recommended settings with buttons for recommended/manual/custom/defer.
  - Apply only selected profile settings.
  - Write report with selected values, sources, and verification.
  experienced_path:
  - Allow source/details view per setting.
  - Allow custom value with source or explicit owner override.
  - Record every deviation from LaunchRoom recommended baseline.
  button_source: Use settings[].interaction.buttons from the research ledger.
deferred_or_gated_settings:
  terminal.cwd: Collect project_path in Stage 1 if user provides it; final workspace verification belongs to Stage 2 unless
    owner decides Stage 1 should apply it.
  security.allow_private_urls: Default false. Enable only after local/private URL gate.
  browser.allow_private_urls: Default false. Enable only after local browser/private URL gate.
  gateway_and_mcp: Not generated by this baseline. Stage 5 only, with secret/env isolation.
  advanced_toolsets: Delegation, cronjob, messaging, image_gen, tts, x_search, MCP-backed tools require explicit stage/user/tool
    readiness decisions.
generation_rules_for_config_yaml:
- Generate config.yaml from profile_config_baseline only after the wizard records user choices.
- Do not write placeholder strings like <project_path> into a live profile config; either resolve or defer.
- Do not write secrets into config.yaml unless official Hermes docs require a non-secret reference such as ${ENV_VAR}.
- Never copy .env, auth.json, state.db, sessions, memories, logs, or raw MCP env values from another profile.
- If official Hermes docs or installed DEFAULT_CONFIG contradict this file, stop and update the ledger/baseline before applying.
verification_requirements:
- YAML parse succeeds.
- Each generated config key maps back to a ledger setting or documented inherited default.
- Every non-default LaunchRoom value has a reason and source_refs.
- Wizard report records selected button IDs and deviations.
- Secret scan passes before commit.
- Toolset changes are verified after reset/new session because Hermes does not apply tool changes mid-conversation.
