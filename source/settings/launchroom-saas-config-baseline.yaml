      write_method:
        config_key: tool_output.max_lines
      verify_method:
      - sanitized config readback
      - run a bounded diagnostic command and confirm output is capped/paged rather than unlimited
    max_line_length:
      value: 2000
      policy: keep_2000
      source_refs:
      - installed_default_config
      - sanitized_airmida_patterns
