artifact_id: LAUNCHROOM_SKILLPACK_REGISTRY_v0_1
artifact_type: launchroom_skillpack_registry
status: draft_for_owner_review
status_marker: public LaunchRoom test package / not AIRMIDA authority
language: en
purpose:
  summary: Expose high-value Hermes skills as staged LaunchRoom skillpacks instead of dumping every installed skill into the
    beginner default profile.
  principle: small default bundle, explicit user choice, platform/environment awareness, gates before side effects
  not_purpose:
  - not installing skills automatically
  - not enabling Hermes toolsets automatically
  - not promoting local skills into the public package automatically
  - not mutating provider/runtime/cloud/gateway/n8n surfaces
  - not reading or storing secrets
  - not git publication or release execution
  - not patching or generalizing AIRMIDA internal skills into public LaunchRoom skills
  - not mixing source-lineage skills with sanitized LaunchRoom abstraction skills
source_lineage:
  runtime_enabled_audit: local audit LAUNCHROOM_SKILL_INTEGRATION_AUDIT_20260702_2155 (97 runtime-enabled skills)
  hidden_advanced_audit: local audit LAUNCHROOM_EXTRA_14_FILESYSTEM_SKILLS_DEEP_STUDY_20260702_2225 (14 platform/environment/advanced
    candidates)
  runtime_inventory_source: hermes skills list --enabled-only + skills_list tool
  source_status: evidence for registry design only; not AIRMIDA authority
  incremental_runtime_delta: 'Read-only check found one new runtime-enabled AIRMIDA internal skill: airmida-memory-stack-operator.'
  sanitized_abstraction_source_boundary: AIRMIDA internal skills are source-lineage/pattern evidence only; LaunchRoom abstractions
    must be new launchroom-* skills.
  boundary_doc: source/skillpacks/SANITIZED_ABSTRACTION_BOUNDARY.md
inventory_counts:
  runtime_enabled_skills_input: 98
  filesystem_skillmd_seen_input: 112
  hidden_or_advanced_candidates_input: 14
  existing_launchroom_bundled_skills: 3
  public_beginner_default_hidden_candidates: 0
  sanitized_abstraction_skills_input: 3
visibility_classes:
  runtime_enabled_now: Skill is visible in the current runtime-enabled profile/platform inventory and can be recommended or
    loaded after normal LaunchRoom choice gates.
  environment_or_platform_candidate: Skill exists and is valuable, but is hidden by OS, environment, tool, dependency, or
    runtime condition; offer only when that condition is true and the relevant gate is accepted.
  excluded_or_lab_only: Skill is valuable only in explicitly gated internal/lab contexts and must not appear in public beginner
    flows.
  sanitized_launchroom_abstraction: New customer-safe LaunchRoom skill created from sanitized AIRMIDA operating patterns;
    source internal skills are lineage only and must not be patched, renamed, or exposed as public defaults by this registry.
default_install_policy:
  default_bundle_is_small: true
  do_not_install_all_runtime_skills: true
  do_not_install_hidden_candidates_by_default: true
  bundled_profile_skills:
  - launchroom-profile-operator
  - launchroom-hermes-settings-guide
  - launchroom-saas-operator
  marketplace_model: offer curated packs by stage, project type, host platform, and accepted gate
  sanitized_abstractions_are_separate_from_airmida_internal_skills: true
  do_not_patch_airmida_internal_skills_for_launchroom: true
  sanitized_abstraction_boundary_doc_required: true
actions_executed_by_registry:
  skills_installed: false
  skills_enabled: false
  skills_promoted: false
  dependencies_installed: false
  toolsets_enabled_without_gate: false
  memory_written: false
  agents_spawned: false
  implementation_executed: false
  runtime_mutation: false
  cloud_mutation: false
  gateway_mutation: false
  n8n_mutation: false
  git_publication_executed: false
  secrets_read_or_written: false
