artifact_id: LAUNCHROOM_STAGE_3_ENGINEERING_TOOLCHAIN_CAPABILITY_MAP_v0_2
artifact_type: launchroom_stage_wizard_contract
status: draft_for_owner_review
stage_id: stage_3_tool_readiness
stage_name: Engineering Toolchain & Capability Map
language: en

purpose:
  summary: >-
    Define the Stage 3 wizard that turns local executable checks into a no-secret
    software purpose map, engineering capability graph, and gated installation recommendation package. Stage 3
    helps the agent choose task-class capability workflows, not isolated tools: task -> capability -> tool bundle -> skill bundle -> gates -> verification.
  not_purpose:
    - not automatic software installation
    - not provider/model credential setup
    - not gateway or messaging setup
    - not MCP credential wiring
    - not n8n, Cloudflare, Hetzner, Docker service, or production runtime mutation
    - not reading .env, auth.json, state.db, OAuth stores, private keys, or credential files

stage_boundary:
  owns:
    - local command presence/version/path probes
    - tool purpose classification
    - required/recommended/optional/deferred readiness tiers
    - missing software recommendation package
    - no-secret software inventory report
    - no-secret software purpose map
    - engineering capability graph
    - task-class to tool-bundle and skill-bundle mapping
    - next-step handoff to Stage 4 starter capability pack
  does_not_own:
    - installing software without explicit install gate
    - enabling cloud/runtime/provider integrations
    - starting services or daemons
    - reading or storing secrets
    - git mutation inside user projects

software_catalog:
  required:
    hermes:
      purpose: primary local AI-agent runtime and setup surface
      agent_use: profile creation, config validation, skills, tools, sessions, gateway-ready later stages
      install_hint: install or repair Hermes Agent through official Hermes setup path
    python:
      purpose: local scripting and validator execution
      agent_use: run validators, generate reports, execute safe local scripts
      install_hint: install Python 3.11+ or use the approved Hermes runtime Python
    git:
      purpose: repository version control
      agent_use: inspect status/history, create gated branches/PRs, verify clean trees
      install_hint: install Git for Windows or platform package manager
  recommended:
    node:
      purpose: JavaScript/TypeScript and web/SaaS project workflows
      agent_use: inspect package manifests, run JS tooling later after gate
      install_hint: install Node.js LTS
    npm:
      purpose: Node package manager bundled with Node.js
      agent_use: inspect/run JS package scripts later after gate
      install_hint: install with Node.js LTS
    rg:
      purpose: fast code and text search
      agent_use: large workspace search without slow shell fallbacks
      install_hint: install ripgrep
    uv:
      purpose: modern Python package/project manager
      agent_use: reproducible Python tooling and local validators
      install_hint: install uv
    winget:
      purpose: Windows package manager
      agent_use: propose repeatable install commands after user gate
      install_hint: enable/install App Installer or winget
  optional:
    docker:
      purpose: containers for app stacks and local services
      agent_use: later bounded service/runtime pilots after explicit gate
      install_hint: install Docker Desktop only if container workflows are selected
    wsl:
      purpose: Linux compatibility layer on Windows
      agent_use: optional Linux tooling surface; not required when local backend works
      install_hint: enable WSL only if user selects Linux/WSL workflows


capability_graph:
  rule: Select a capability workflow first, then use its tool bundle, skill bundle, gates, and verification path.
  task_classes:
    profile_and_workspace_setup:
      goal: create or repair the LaunchRoom profile and workspace boundary
      required_tools: [hermes, python, git]
      supporting_skills: [hermes-agent]
      workflow: [inspect_profile, apply_installer, verify_reports, handoff_next_stage]
      gates: [profile_mutation_gate]
      verification: [profile_files_exist, workspace_reports_parse, validators_pass]
    code_change_delivery:
      goal: safely change repository files and publish only after owner gate
      required_tools: [git, python, ripgrep]
      recommended_tools: [gh, node, npm, uv]
      supporting_skills: [github-pr-workflow, test-driven-development, requesting-code-review]
      workflow: [inspect_repo_state, patch_files, run_tests_or_validators, inspect_diff, commit_after_gate, pr_after_gate]
      gates: [commit_gate, push_pr_gate, merge_gate]
      verification: [tests_or_validators_pass, git_status_clean_or_expected, ci_green]
    research_and_evidence:
      goal: gather grounded evidence and convert it into project-safe decisions
      required_tools: [hermes, python]
      recommended_tools: [ripgrep]
      supporting_skills: [experience-grounded-work-preflight, governed-agent-knowledge-extraction]
      workflow: [route_task, inspect_sources, capture_evidence, map_uncertainty, propose_next_decision]
      gates: [authority_mutation_gate]
      verification: [source_paths_recorded, no_secret_values, conclusions_tied_to_evidence]
    external_agent_handoff:
      goal: use external AI/code agents only after tool readiness smoke checks
      required_tools: [git]
      recommended_tools: [gh, codex, claude]
      supporting_skills: [airmida-external-agent-tool-readiness, codex, claude-code, github-pr-workflow]
      workflow: [check_command, verify_auth_presence_without_secret_readback, run_readonly_smoke, prepare_executor_packet, assign_after_gate]
      gates: [external_agent_gate, credential_flow_gate]
      verification: [version_present, smoke_pass_or_blocker_recorded, handoff_packet_has_scope]
    web_browser_qa:
      goal: inspect web/app surfaces with reproducible evidence
      required_tools: [hermes]
      recommended_tools: [node, npm, browser]
      supporting_skills: [dogfood, computer-use]
      workflow: [start_or_target_surface_after_gate, inspect_ui, capture_evidence, report_bugs, verify_fix]
      gates: [browser_runtime_gate, local_server_gate]
      verification: [screenshots_or_logs, repro_steps, no_private_surface_without_gate]
    cloud_runtime_readiness:
      goal: prepare but not mutate cloud/runtime surfaces
      required_tools: [git]
      recommended_tools: [docker, wrangler, cloudflared, hcloud]
      supporting_skills: [airmida-cloudflare-readonly-inventory, airmida-hetzner-readonly-inventory, airmida-n8n-governed-workflow-ops]
      workflow: [readonly_inventory, identify_missing_cli, propose_install_or_auth_gate, stop_before_mutation]
      gates: [runtime_provider_gate, secret_gate, deployment_gate]
      verification: [readonly_only, no_credentials_printed, no_deploy_or_service_mutation]
    communication_gateway_readiness:
      goal: prepare messaging surfaces without exposing secrets
      required_tools: [hermes]
      recommended_tools: [gateway_platform_tools]
      supporting_skills: [governed-messaging-gateway-setup, hermes-agent]
      workflow: [gateway_status_check, channel_map, secret_entry_path, test_after_gate]
      gates: [gateway_setup_gate, pairing_gate]
      verification: [gateway_status_recorded, no_tokens_in_reports, delivery_test_after_gate]
    observability_and_reports:
      goal: make agent work auditable and repeatable
      required_tools: [python, git]
      recommended_tools: [ripgrep, gh]
      supporting_skills: [governed-agent-engineering-standards]
      workflow: [write_report, parse_yaml, scan_markers, capture_command_outputs, keep_status_clean]
      gates: [publication_gate]
      verification: [reports_parse, marker_scan_pass, ci_or_local_checks_pass]
    security_and_secret_safety:
      goal: prevent credential exposure and unsafe mutation
      required_tools: [hermes, python]
      recommended_tools: [ripgrep]
      supporting_skills: [governed-agent-engineering-standards, hermes-agent]
      workflow: [avoid_secret_paths, redact_outputs, scan_changed_files, block_unsafe_actions]
      gates: [secret_gate, production_mutation_gate]
      verification: [secret_scan_count_zero, blocked_actions_recorded, no_env_auth_state_readback]

required_inputs:
  profile_name:
    source: Stage 1
  workspace_path:
    source: Stage 2
  install_gate:
    default: false
    rule: Stage 3 may propose install commands but must not run them without a separate explicit owner install gate.

wizard_flow:
  - step_id: 0_preflight
    name: Verify Stage 2 workspace boundary
    mode: read_only
    checks:
      - workspace exists
      - workspace .hermes/reports/workspace-onboarding-report.yaml exists when Stage 2 was applied
      - terminal cwd has a selected workspace value or is explicitly partial/deferred
  - step_id: 1_probe_tools
    name: Probe local tools without secrets
    mode: local_read_only
    commands:
      - os and shell probe
      - hermes --version
      - python --version
      - git --version
      - node --version
      - npm --version
      - rg --version
      - uv --version
      - winget --version
      - docker --version
      - wsl --version
    forbidden:
      - package installation
      - service start/stop
      - credential file reads
      - cloud API calls
  - step_id: 2_classify_readiness
    name: Classify readiness tiers
    mode: local_reasoning
    outputs:
      - ready_required
      - missing_required
      - ready_recommended
      - missing_recommended
      - ready_optional
      - optional_later
  - step_id: 3_write_software_purpose_map
    name: Write no-secret software purpose map
    mode: local_file_generation
    output: .hermes/reports/software-purpose-map.yaml
  - step_id: 4_write_install_recommendation_package
    name: Write gated install recommendation package
    mode: local_file_generation
    output: .hermes/reports/software-install-recommendation.yaml
    rule: commands are suggestions only and require explicit install gate before execution
  - step_id: 5_write_engineering_capability_graph
    name: Write task-class engineering capability graph
    mode: local_file_generation
    output: .hermes/reports/capability-graph.yaml
    rule: capability graph teaches workflow selection and does not authorize gated actions
  - step_id: 6_report_next_decision
    name: Report Stage 3 result and next stage
    mode: handoff
    result_states:
      pass: all required tools present and reports written
      partial: required tools present but recommended/optional tools missing or deferred
      blocked: required tool missing or local probe could not run safely
    next_decision: continue_to_stage_4_starter_capability_pack

outputs:
  required:
    - .hermes/reports/software-inventory-report.yaml
    - .hermes/reports/software-purpose-map.yaml
    - .hermes/reports/software-install-recommendation.yaml
    - .hermes/reports/capability-graph.yaml
  required_report_fields:
    software_inventory:
      - installed
      - missing_required
      - missing_recommended
      - optional_later
      - install_gate_required
    software_purpose_map:
      - tools
      - readiness_tiers
      - agent_use_cases
      - boundaries
    software_install_recommendation:
      - install_gate_required
      - required_missing
      - recommended_missing
      - optional_later
      - suggested_commands_windows
      - do_not_run_without_gate
    capability_graph:
      - task_classes
      - required_tools
      - supporting_skills
      - workflow
      - gates
      - verification

acceptance_criteria:
  - Tool probes do not read secrets.
  - Required tools are classified separately from recommended and optional tools.
  - Every probed tool has a purpose and agent_use value.
  - Capability graph maps task classes to tool bundles, skill bundles, workflows, gates, and verification.
  - Missing tools are included in a gated install recommendation package.
  - No install command is executed by Stage 3.
  - WSL is optional and must not block Starter when local terminal works.
  - Docker is optional/recommended only for later container workflows and must not be started by Stage 3.
  - YAML reports parse successfully.
  - Validators and CI pass.

result_states:
  pass:
    meaning: Required local toolchain is ready and the agent has a current software and capability map.
  partial:
    meaning: Required toolchain is usable, but recommended/optional software remains gated or deferred.
  blocked:
    meaning: Required local tool is missing or tool probing cannot be completed safely.

next_stage:
  id: stage_4_starter_capability_pack
  reason: After local software readiness is known, LaunchRoom can map Hermes tools, skills, and memory into a starter capability pack.
