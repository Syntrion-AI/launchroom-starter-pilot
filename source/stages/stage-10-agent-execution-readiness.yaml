acceptance_criteria:
  - Agent readiness folder exists under workspace `.hermes/agent-readiness/`.
  - All required markdown and YAML readiness files exist.
  - EXECUTION_READINESS_REPORT.yaml parses as YAML.
  - Stage 10 references Stage 9 audit report and audit findings, Stage 8 execution packet, Stage 8 external practice inputs, Stage 3 software reports, and Stage 4 starter capability pack.
  - Stage 9 audit findings inform execution blockers and owner repair decisions before any implementation gate.
  - Toolchain requirements map project work to required software, Hermes toolsets, skills, agent roles, commands, gates, and verification.
  - TOOLCHAIN_ACTIVATION_PLAN.yaml provides a machine-readable gated activation plan for toolchain requirements, software gaps, toolsets, skills, agent pipeline, install entries, command classes, and readiness blockers.
  - Software gap analysis separates installed/present, missing/unknown, optional, and gated install candidates.
  - Install plan explains why each software category may be needed, install command shape, verification command, risk, rollback, admin/restart/PATH notes, and owner gate.
  - Hermes toolset plan and skill load plan recommend activation/load order without enabling or installing anything automatically.
  - Agent pipeline plan defines planner/repair, toolchain verifier, implementer, verification arbiter, and owner gate roles without spawning agents.
  - Command readiness separates read-only inspection, gated local commands, install commands, and forbidden runtime/secret/git/publication commands.
  - Validators parse the generated activation plan and fail if required structured sections, install-entry fields, command classes, gates, blocker records, or false action flags are missing.
  - Execution remains blocked by default until Stage 9 issues are repaired, Stage 10 readiness is owner-accepted, and an implementation gate is granted.
  - Validators and CI pass.

result_states:
  pass:
    meaning: Toolchain is ready enough for an owner implementation gate, but execution is still a separate decision.
  partial:
    meaning: Readiness package exists but project-specific files/software/commands/skills require owner review or install/toolset gates.
  blocked:
    meaning: Missing critical software, unresolved Stage 9 blockers, or forbidden activation requirements block execution.

next_decision:
  options:
    - repair Stage 9 blockers
    - approve install plan for missing software
    - approve Hermes toolset or skill loading plan
    - approve implementation gate after readiness acceptance
    - defer execution
