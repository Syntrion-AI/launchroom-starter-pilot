artifact_id: LAUNCHROOM_STAGE_8_LOCAL_PILOT_EXECUTION_PACKET_v0_1
artifact_type: launchroom_stage_wizard_contract
status: draft_for_owner_review
stage_id: stage_8_local_pilot_execution_packet
stage_name: Local Pilot Execution Packet
language: en

purpose:
  summary: >-
    Convert the Stage 7 first-slice planning packet into a bounded local-only
    execution packet that an agent or developer can follow after an explicit
    implementation gate. Stage 8 prepares scoped file-change, command, test,
    evidence, review, and handoff instructions. It does not execute code changes,
    install dependencies, connect live channels, deploy, or mutate runtime,
    cloud, provider, gateway, n8n, MCP, database, git publication, or secret
    surfaces.
  not_purpose:
    - not autonomous product implementation
    - not dependency installation
    - not live messenger/email/calendar/notes connection
    - not gateway setup, autostart, or pairing
    - not provider/model/billing mutation
    - not Cloudflare, Hetzner, n8n, MCP, database, or production runtime mutation
    - not git push/public release from generated artifacts
    - not secret readback or credential storage

stage_boundary:
  consumes:
    - .hermes/first-slice/IMPLEMENTATION_BRIEF.md
    - .hermes/first-slice/LOCAL_PILOT_PLAN.md
    - .hermes/first-slice/ACCEPTANCE_TESTS.md
    - .hermes/first-slice/USER_DEMO_SCRIPT.md
    - .hermes/first-slice/RISKS_AND_ROLLBACK.md
    - .hermes/first-slice/DECISION_GATE.md
    - .hermes/first-slice/READINESS_REPORT.yaml
  owns:
    - local pilot execution packet folder
    - execution packet scaffold
    - scoped file change plan
    - command plan with allowlist/gates
    - test plan
    - evidence log scaffold
    - review checklist
    - handoff summary
    - readiness report with safety flags
  does_not_own:
    - writing product code before an implementation gate
    - running package installs
    - connecting real communication channels
    - reading/writing secrets
    - changing Hermes runtime/provider/gateway configuration
    - creating cloud resources

local_pilot_layout:
  root: .hermes/local-pilot/
  required_files:
    - START_HERE.md
    - EXECUTION_PACKET.md
    - FILE_CHANGE_PLAN.md
    - COMMAND_PLAN.md
    - TEST_PLAN.md
    - EVIDENCE_LOG.md
    - REVIEW_CHECKLIST.md
    - HANDOFF_SUMMARY.md
    - READINESS_REPORT.yaml

packet_model:
  status_marker: Hermes working artifact / not AIRMIDA authority
  task_flow: first slice plan -> execution packet -> file change plan -> command plan -> test plan -> evidence log -> review checklist -> handoff summary
  permission_tier: local_execution_packet_readiness_only
  required_fields:
    - objective
    - source_lineage
    - allowed_file_scope
    - forbidden_file_scope
    - command_allowlist
    - command_gate_notes
    - test_plan
    - evidence_log
    - review_checklist
    - handoff_summary
    - rollback_plan
    - next_gate

outputs:
  required:
    - .hermes/local-pilot/START_HERE.md
    - .hermes/local-pilot/EXECUTION_PACKET.md
    - .hermes/local-pilot/FILE_CHANGE_PLAN.md
    - .hermes/local-pilot/COMMAND_PLAN.md
    - .hermes/local-pilot/TEST_PLAN.md
    - .hermes/local-pilot/EVIDENCE_LOG.md
    - .hermes/local-pilot/REVIEW_CHECKLIST.md
    - .hermes/local-pilot/HANDOFF_SUMMARY.md
    - .hermes/local-pilot/READINESS_REPORT.yaml
  required_markers:
    - Hermes working artifact / not AIRMIDA authority
    - implementation_executed: false
    - file_changes_executed: false
    - commands_executed: false
    - tests_executed: false
    - dependencies_installed: false
    - runtime_mutation: false
    - cloud_mutation: false
    - gateway_mutation: false
    - n8n_mutation: false
    - secrets_read_or_written: false
    - git_publication_executed: false
    - execution_packet_present: true
    - file_change_plan_present: true
    - command_plan_present: true
    - test_plan_present: true
    - evidence_log_present: true
    - review_checklist_present: true
    - handoff_summary_present: true
    - next_execution_gate_present: true

acceptance_criteria:
  - Local pilot folder exists under workspace `.hermes/local-pilot/`.
  - All required markdown and YAML execution packet files exist.
  - READINESS_REPORT.yaml parses as YAML.
  - Stage 8 references Stage 7 implementation brief, local pilot plan, acceptance tests, user demo script, risks/rollback, decision gate, and readiness report.
  - Execution packet states one bounded objective and one owner review gate.
  - File change plan separates allowed paths, forbidden paths, and unknown paths requiring user approval.
  - Command plan separates safe read-only commands, gated local commands, and forbidden commands.
  - Test plan maps checks to expected evidence and acceptance criteria.
  - Evidence log is empty/scaffolded and does not fabricate results.
  - Review checklist and handoff summary are ready for a later executor.
  - All implementation/file-change/command/test/runtime/cloud/provider/gateway/n8n/git/secret actions remain false/gated.
  - Validators and CI pass.

result_states:
  pass:
    meaning: Local pilot execution packet is ready for an explicit implementation gate.
  partial:
    meaning: Packet exists but some Stage 7 evidence is missing or deferred.
  blocked:
    meaning: Local pilot execution packet cannot be generated safely.

next_decision:
  options:
    - approve local implementation execution
    - revise execution packet
    - gather missing project evidence
    - prepare communication/runtime gate separately
    - defer implementation
